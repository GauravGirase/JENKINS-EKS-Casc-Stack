sonarqube:
  nodeSelector:
    role: static
  tolerations:
    - key: role
      value: static
      effect: NoSchedule
  resources:
    requests:
      cpu: '500m'
      memory: 2Gi
    limits:
      cpu: '2'
      memory: 4Gi
  persistence:
    enabled: true
    storageClass: gp3
    size: 20Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - name: sonarqube.gauravgirase.co.in
        path: /
        pathType: Prefix
    tls:
      - secretName: sonarqube-tls
        hosts:
          - sonarqube.gauravgirase.co.in

postgresql:
  persistence:
    enabled: true
    storageClass: gp3
    size: 10Gi
  nodeSelector:
    role: static
  tolerations:
    - key: role
      value: static
      effect: NoSchedule